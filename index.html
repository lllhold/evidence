<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Descarga</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .bg-masthead {
            /* Ruta a tu imagen */
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('bg-masthead.jpg');
            height: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }
        .btn-download {
            background-color: #007bff;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            font-size: 1.2rem;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn-download:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <header class="bg-masthead">
        <div>
            <h1>Descarga mi archivo</h1>
            <p>Haz clic en el botón de abajo para obtener el recurso.</p>
            <br>
            <!-- Cambia 'tu-archivo.zip' por el nombre real de tu archivo -->
            <a href="bg-masthead.jpg" download class="btn-download">
                Descargar Ahora
            </a>
        </div>
    </header>

</body>
</html>
